<div class="p-4 border-t border-gray-100">

</div>

<!-- 地图画布 -->
<div class="flex-1 map-bg relative cursor-grab active:cursor-grabbing p-20">
<!-- 模拟地图线条和区域 (简化展示) -->
<div class="absolute inset-20 border-4 border-dashed border-gray-200 rounded-[40px] pointer-events-none"></div>
<!-- 校园建筑模拟 -->
<div class="absolute top-[15%] left-[20%] w-48 h-32 bg-white/60 border-2 border-indigo-100 rounded-lg flex items-center justify-center shadow-sm">
<span class="text-indigo-300 font-bold uppercase tracking-tighter opacity-50">图书馆区</span>
</div>
<div class="absolute bottom-[20%] right-[15%] w-64 h-40 bg-white/60 border-2 border-indigo-100 rounded-lg flex items-center justify-center shadow-sm">
<span class="text-indigo-300 font-bold uppercase tracking-tighter opacity-50">东区操场</span>
</div>
<div class="absolute top-[40%] right-[30%] w-40 h-40 bg-white/60 border-2 border-indigo-100 rounded-full flex items-center justify-center shadow-sm">

</div>
</div>
<!-- 迷你标签 -->
<div class="mt-2 bg-amber-500 text-white text-[10px] px-2 py-0.5 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
                    大橘 (图书馆)
                </div>
</div>
<!-- 地图标注点位 2 -->
<div class="absolute top-[50%] right-[40%] group cursor-pointer" onclick="togglePopup('popup-2')">

<div class="relative bg-white p-1 rounded-full shadow-lg border-2 border-indigo-500">

                </div>

<div class="relative bg-white p-1 rounded-full shadow-lg border-2 border-green-500">

                </div>

<div class="relative h-32 overflow-hidden">

<button class="absolute top-2 right-2 bg-black/20 hover:bg-black/40 p-1 rounded-full text-white backdrop-blur-md" onclick="togglePopup('popup-1')">

</div>

<iconify-icon class="text-xl" icon="mdi:alert-decagram"></iconify-icon>
</button>
</div>

<!-- 底部数据动态栏 -->

</div>

                    </div>

                    </div>

<style>
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll-left {
            display: flex;
            width: fit-content;
            animation: scroll-left 30s linear infinite;
        }
    </style>
<script>
        function togglePopup(id) {
            const popup = document.getElementById(id);
            if(popup.classList.contains('hidden')) {
                // 隐藏所有其它popup
                document.querySelectorAll('[id^="popup-"]').forEach(p => p.classList.add('hidden'));
                popup.classList.remove('hidden');
            } else {
                popup.classList.add('hidden');
            }
        }
    </script>
</body>
